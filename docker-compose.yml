services:
  postgres:
    image: postgres:16-alpine
    container_name: gusto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gusto
      POSTGRES_PASSWORD: gusto
      POSTGRES_DB: gusto
    ports:
      - "5003:5432"
    volumes:
      - gusto-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gusto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gusto-redis
    restart: unless-stopped
    ports:
      - "5004:6379"
    volumes:
      - gusto-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for chef docs/photos (used from Phase 1)
  minio:
    image: minio/minio:latest
    container_name: gusto-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gusto
      MINIO_ROOT_PASSWORD: gustosecret
    ports:
      - "5005:9000"
      - "5006:9001"
    volumes:
      - gusto-minio:/data

volumes:
  gusto-pg:
  gusto-redis:
  gusto-minio:
